displayName: Alibaba Cloud (阿里云)
homepage: https://www.alibabacloud.com/
cliType: standalone
region: china
cliInstall:
  - command: brew install aliyun-cli
    official: true
skillInstall: []
openSourceDocsUrl: https://github.com/aliyun/aliyun-cli
officialDocsUrl: https://help.aliyun.com/zh/cli/
status: active
category: devops
tags: [cloud, infrastructure, alibaba, api]
oneLiner: The universal command-line tool to manage and automate Alibaba Cloud resources.
description: >
  The Alibaba Cloud CLI (`aliyun`) translates the vast web console capabilities into
  executable terminal commands. It is essential for DevOps teams to interact with OpenAPI,
  manage ECS instances, configure networking, and script complex infrastructure deployments
  without manual GUI intervention.
useCases:
  - automate the provisioning and scaling of ECS instances
  - retrieve and update cloud configurations in CI/CD pipelines
  - manage OSS bucket storage and permissions via shell scripts
alternativesTo: []

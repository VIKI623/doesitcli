displayName: Alibaba Cloud (阿里云)  # app name
homepage: https://www.alibabacloud.com/  # official website
cliType: standalone  # standalone = separate install; embedded = bundled with desktop app
region: china  # global | china (maintainer-only)
cliInstall:  # CLI install commands; at least one for standalone apps
  - command: brew install aliyun-cli
    official: true
skillInstall: []  # agent skill install commands; [] if none
openSourceDocsUrl: https://github.com/aliyun/aliyun-cli  # GitHub repo URL if open-source, else null
officialDocsUrl: https://help.aliyun.com/zh/cli/  # product docs page, or null
status: active  # active | beta | deprecated
categories: [cloud]  # one or more categories
tags: [cloud, infrastructure, alibaba, api]  # free-form lowercase tags
oneLiner: The universal command-line tool to manage and automate Alibaba Cloud resources.  # ≤ 140 chars
description: >  # 2-4 sentences
  The Alibaba Cloud CLI (`aliyun`) translates the vast web console capabilities into
  executable terminal commands. It is essential for DevOps teams to interact with OpenAPI,
  manage ECS instances, configure networking, and script complex infrastructure deployments
  without manual GUI intervention.
intents:  # what a user or agent would want to DO
  - automate the provisioning and scaling of ECS instances
  - retrieve and update cloud configurations in CI/CD pipelines
  - manage OSS bucket storage and permissions via shell scripts
alternativesTo: []  # similar app names; [] if none

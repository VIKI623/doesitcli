displayName: Dashlane  # app name
homepage: https://www.dashlane.com/  # official website
cliType: standalone  # standalone = separate install; embedded = bundled with desktop app
region: global  # global | china (maintainer-only)
cliInstall:  # CLI install commands; at least one for standalone apps
  - command: brew install dashlane/tap/dashlane-cli
    official: true
skillInstall: []  # agent skill install commands; [] if none
openSourceDocsUrl: https://github.com/Dashlane/dashlane-cli  # GitHub repo URL if open-source, else null
officialDocsUrl: https://cli.dashlane.com/  # product docs page, or null
status: active  # active | beta | deprecated
categories: [security]  # one or more categories
tags: [password-manager, enterprise, security, secrets]  # free-form lowercase tags
oneLiner: Retrieve Dashlane vault credentials and inject secrets into CI/CD pipelines.  # ≤ 140 chars
description: >  # 2-4 sentences
  The Dashlane CLI provides non-interactive access to your Dashlane vault, designed primarily
  for CI/CD and automation use cases. It can read passwords, secure notes, and OTP codes from
  the vault and pipe them into scripts or environment variables. The tool supports device
  registration and master-password or SSO authentication for enterprise environments.
intents:  # what a user or agent would want to DO
  - retrieve vault credentials in CI/CD pipelines without human interaction
  - inject secrets as environment variables into automated build processes
  - read one-time passwords programmatically for automated login flows
alternativesTo: [1Password, Bitwarden]  # similar app names; [] if none

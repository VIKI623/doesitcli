displayName: NetEase Cloud Music (网易云音乐)  # app name
homepage: https://developer.music.163.com/  # official website
cliType: standalone  # standalone = separate install; embedded = bundled with desktop app
region: china  # global | china (maintainer-only)
cliInstall:  # CLI install commands; at least one for standalone apps
  - command: npm install -g @music163/ncm-cli
    official: true
skillInstall:  # agent skill install commands; [] if none
  - command: npx skills add https://github.com/NetEase/skills
    official: true
openSourceDocsUrl: null  # GitHub repo URL if open-source, else null
officialDocsUrl: https://developer.music.163.com/st/developer/document?docId=c5cb8108c73b42c8bec8869b26a15738  # product docs page, or null
status: active  # active | beta | deprecated
categories: [media]  # one or more categories
tags: [music, media, tui, agent]  # free-form lowercase tags
oneLiner: Official NetEase Cloud Music CLI featuring a TUI player and AI agent integration.  # ≤ 140 chars
description: >  # 2-4 sentences
  The `@music163/ncm-cli` brings the NetEase Cloud Music experience to the terminal.
  It features a full TUI player with synchronized lyrics and vinyl animations. More
  importantly, it exposes agent skills that allow AI assistants to search songs,
  play music, and curate daily recommendations using natural language.
intents:  # what a user or agent would want to DO
  - control music playback globally via terminal commands (`ncm-cli play`)
  - allow AI agents to generate context-aware playlists (e.g., "songs for coding")
  - use the TUI player for distraction-free listening inside a terminal multiplexer
alternativesTo: []  # similar app names; [] if none

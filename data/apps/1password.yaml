displayName: 1Password  # app name
homepage: https://1password.com/  # official website
cliType: standalone  # standalone = separate install; embedded = bundled with desktop app
region: global  # global | china (maintainer-only)
cliInstall:  # CLI install commands; at least one for standalone apps
  - command: brew install 1password-cli
    official: true
skillInstall:  # agent skill install commands; [] if none
  - command: npx skills add 1password-cli-manager
    official: true
openSourceDocsUrl: null  # GitHub repo URL if open-source, else null
officialDocsUrl: https://developer.1password.com/docs/cli/  # product docs page, or null
status: active  # active | beta | deprecated
categories: [security]  # one or more categories
tags: [security, secrets, password-manager, authentication]  # free-form lowercase tags
oneLiner: The ultimate CLI to securely authenticate, manage, and inject secrets into workflows.  # ≤ 140 chars
description: >  # 2-4 sentences
  1Password transitions from a consumer GUI password manager to an enterprise-grade
  secrets injection engine via its CLI (`op`). Using biometric authentication, `op`
  can securely load environment variables and SSH keys into terminal sessions at
  runtime. Agent skills allow AI models to request credentials on the fly, ensuring
  secrets are never hardcoded or leaked into the prompt context window.
intents:  # what a user or agent would want to DO
  - inject secrets securely into local development servers using `op run -- npm start`
  - automate the rotation and retrieval of API keys in headless CI/CD environments
  - authorize SSH connections using biometric signatures managed by the 1Password GUI
alternativesTo: []  # similar app names; [] if none

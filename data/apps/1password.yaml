displayName: 1Password
homepage: https://1password.com/
cliType: standalone
region: global
cliInstall:
  - command: brew install 1password-cli
    official: true
skillInstall:
  - command: npx skills add 1password-cli-manager
    official: true
openSourceDocsUrl: null
officialDocsUrl: https://developer.1password.com/docs/cli/
status: active
category: infra
tags: [security, secrets, password-manager, authentication]
oneLiner: The ultimate CLI to securely authenticate, manage, and inject secrets into workflows.
description: >
  1Password transitions from a consumer GUI password manager to an enterprise-grade
  secrets injection engine via its CLI (`op`). Using biometric authentication, `op`
  can securely load environment variables and SSH keys into terminal sessions at
  runtime. Agent skills allow AI models to request credentials on the fly, ensuring
  secrets are never hardcoded or leaked into the prompt context window.
useCases:
  - inject secrets securely into local development servers using `op run -- npm start`
  - automate the rotation and retrieval of API keys in headless CI/CD environments
  - authorize SSH connections using biometric signatures managed by the 1Password GUI
alternativesTo: []

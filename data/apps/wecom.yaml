highlight: 65
category: collaboration
tags: [chat, enterprise, agent, tencent]
oneLiner: WeCom's official CLI enabling agentic access to messaging, docs, and meetings.
description: >
  The WeCom CLI exposes core product capabilities including messaging, calendars,
  documents, smart tables, meetings, and contacts to the terminal. It is explicitly
  designed to support mainstream AI agents through long-lived connection bots, dropping
  the barrier to zero for integrating AI workflows into Tencent's enterprise environment.
useCases:
  - auto-reply to customer inquiries via message APIs
  - generate and distribute daily report documents
  - schedule online meetings and manage to-do lists from shell scripts

# /etc/nginx/conf.d/doesitcli.conf
#
# doesitcli.com — Astro static site + Hono API
# Behind Cloudflare proxy: trust CF-Connecting-IP for the real client IP.

# Real IP from Cloudflare. List from https://www.cloudflare.com/ips/
# Updated periodically; last refreshed 2026.
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;
real_ip_recursive on;

server {
    listen 80;
    listen [::]:80;
    server_name doesitcli.com www.doesitcli.com;

    # Cloudflare terminates HTTPS at the edge and reaches us over HTTP.
    # If you're using Cloudflare "Full" or "Full (strict)" SSL with origin certs,
    # change this to listen 443 ssl and add ssl_certificate / ssl_certificate_key.

    root /home/www/doesitcli/dist;
    index index.html;

    access_log /home/www/doesitcli/logs/access.log;
    error_log  /home/www/doesitcli/logs/error.log;

    # Transfer tuning
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Compression — Cloudflare will re-compress at edge, but compressing on origin
    # saves bandwidth to CF and CPU at the edge.
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        application/rss+xml application/atom+xml image/svg+xml;

    # API → Hono on 127.0.0.1:3000
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_read_timeout 30s;
    }

    # Static site — tell Cloudflare to cache HTML at the edge for 1h,
    # while browsers revalidate every 5min. s-maxage controls CF, max-age controls browser.
    location / {
        try_files $uri $uri.html $uri/index.html =404;
        add_header Cache-Control "public, max-age=300, s-maxage=3600";
    }

    # Cache the immutable Astro asset bundle aggressively
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Plain-text endpoints used by agents — short cache + correct mime
    location ~* \.(md|txt)$ {
        default_type text/plain;
        charset utf-8;
        expires 1h;
    }

    location = /llms.txt        { default_type text/plain; charset utf-8; expires 1h; }
    location = /llms-full.txt   { default_type text/plain; charset utf-8; expires 1h; }
    location = /agent-prompt    { default_type text/plain; charset utf-8; expires 1h; }
    location = /robots.txt      { default_type text/plain; charset utf-8; expires 1d; }

    # Don't leak hidden files
    location ~ /\. { deny all; }
}
